{% macro breadcrumbs(items) %}
<nav class="flex items-center gap-2 text-sm text-gray-500 mb-6" aria-label="Breadcrumb">
    <a href="/" class="hover:text-blue-600 transition">Inicio</a>
    {% for item in items %}
    <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
    </svg>
    {% if item.url %}
    <a href="{{ item.url }}" class="hover:text-blue-600 transition">{{ item.label }}</a>
    {% else %}
    <span class="text-gray-800 font-medium">{{ item.label }}</span>
    {% endif %}
    {% endfor %}
</nav>
{% endmacro %}
