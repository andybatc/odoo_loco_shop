{% extends "base.html" %}

{% block title %}{{ titulo }}{% endblock title %}

{% block content %}
<section class="w-[100vw] relative left-1/2 right-1/2 -ml-[50vw] banner-bg h-[400px] flex items-center justify-center text-center text-white">
    <div class="px-4">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4 drop-shadow-md">
            Mi Tienda <span class="text-blue-400">Odoo</span>
        </h1>
        <p class="text-xl md:text-2xl text-gray-200 max-w-2xl mx-auto font-light drop-shadow-sm">
            Conectando el rendimiento de <span class="font-bold text-orange-400">Rust</span> con el ecosistema ERP
            líder.
        </p>
        <div class="mt-8">
            <a href="/shop/home"
               class="bg-blue-500 hover:bg-blue-600 text-white px-8 py-3 rounded-full font-bold transition-all transform hover:scale-105">
                Ver Productos
            </a>
        </div>
    </div>
</section>
{% endblock content %}
