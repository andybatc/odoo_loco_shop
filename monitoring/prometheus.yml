global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "rust_backend"
    static_configs:
      - targets: ["rust_backend:5150"]

  - job_name: "odoo"
    static_configs:
      - targets: ["odoo:8069"]
    metrics_path: /metrics
