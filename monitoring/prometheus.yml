global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "node"
    static_configs:
      - targets: ["localhost:9100"]

  - job_name: "postgres"
    static_configs:
      - targets: ["localhost:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["localhost:9121"]

  - job_name: "rust_backend"
    static_configs:
      - targets: ["localhost:5150"]

  - job_name: "odoo"
    static_configs:
      - targets: ["localhost:8072"]
    metrics_path: /metrics

  - job_name: "process"
    static_configs:
      - targets: ["localhost:9256"]
