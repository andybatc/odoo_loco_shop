services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: odoo_shop
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./rust_backend
    restart: unless-stopped
    ports:
      - "5150:5150"
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-dev_password}@postgres/odoo_shop
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards/odoo_shop.json:/etc/grafana/provisioning/dashboards/odoo_shop.json:ro
      - grafana_data:/var/lib/grafana

  process-exporter:
    image: ncabatoff/process-exporter:latest
    restart: unless-stopped
    pid: host
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - ./monitoring/process-exporter.yml:/config/process-exporter.yml:ro
    command:
      - --config.path=/config/process-exporter.yml
      - --procfs=/host/proc

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
